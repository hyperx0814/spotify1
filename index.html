<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MyTunes" />
  <link rel="manifest" href="manifest.json" />
  <title>MyTunes</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg2: #111;
      --bg3: #181818;
      --border: #222;
      --border2: #2e2e2e;
      --text: #f0f0f0;
      --text2: #888;
      --text3: #555;
      --accent: #1db954;
      --accent2: #17a347;
      --danger: #f87171;
      --radius: 10px;
      --radius-lg: 16px;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      overflow: hidden;
      height: 100vh;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 210px;
      min-width: 210px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #app-name {
      padding: 20px 16px 6px;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--accent);
    }

    #sidebar-label {
      padding: 14px 16px 6px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text3);
    }

    #playlist-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 8px;
    }

    #playlist-list::-webkit-scrollbar { width: 3px; }
    #playlist-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .pl-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      color: var(--text2);
      transition: background 0.12s, color 0.12s;
      user-select: none;
    }

    .pl-item:hover { background: var(--bg3); color: var(--text); }
    .pl-item.active { background: var(--bg3); color: var(--text); }
    .pl-item.active .pl-dot { background: var(--accent); }

    .pl-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border2);
      flex-shrink: 0;
      transition: background 0.12s;
    }

    .pl-item-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .pl-count { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }

    .pl-del {
      opacity: 0;
      border: none;
      background: none;
      color: var(--text3);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 12px;
      line-height: 1;
      transition: color 0.1s;
    }

    .pl-item:hover .pl-del { opacity: 1; }
    .pl-del:hover { color: var(--danger); }

    #new-pl-btn {
      margin: 8px;
      padding: 9px;
      border: 1px dashed var(--border2);
      background: none;
      color: var(--text3);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      font-family: 'DM Sans', system-ui, sans-serif;
      transition: all 0.15s;
    }

    #new-pl-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Main ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #pl-title {
      font-size: 18px;
      font-weight: 600;
      background: none;
      border: none;
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      flex: 1;
      outline: none;
      letter-spacing: -0.2px;
      border-bottom: 1px solid transparent;
      padding-bottom: 2px;
    }

    #pl-title:focus { border-bottom-color: var(--border2); }
    #pl-title::placeholder { color: var(--text3); }

    #toggle-video-btn {
      padding: 6px 12px;
      border: 1px solid var(--border2);
      background: none;
      color: var(--text2);
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      font-family: 'DM Sans', system-ui, sans-serif;
      transition: all 0.15s;
      white-space: nowrap;
    }

    #toggle-video-btn:hover { border-color: var(--text2); color: var(--text); }
    #toggle-video-btn.active { border-color: var(--accent); color: var(--accent); }

    #body {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 300px;
      overflow: hidden;
    }

    /* ── Player ── */
    #player-col {
      display: flex;
      flex-direction: column;
      padding: 16px 20px;
      gap: 14px;
      overflow-y: auto;
      border-right: 1px solid var(--border);
    }

    #player-frame {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--bg3);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text3);
      font-size: 13px;
      transition: all 0.3s;
    }

    #player-frame.hidden { display: none; }
    #player-frame iframe { width: 100%; height: 100%; border: none; display: block; }

    #now-playing {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
    }

    #np-icon {
      width: 40px; height: 40px;
      border-radius: 8px;
      background: var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    #np-icon.playing { background: var(--accent); }

    #np-text { flex: 1; min-width: 0; }
    #np-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
    #np-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Controls */
    #controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ctrl-btn {
      flex: 1;
      padding: 10px 8px;
      border: 1px solid var(--border2);
      background: var(--bg3);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      transition: background 0.12s, border-color 0.12s;
      white-space: nowrap;
    }

    .ctrl-btn:hover { background: var(--border); }

    .ctrl-btn.primary {
      background: var(--accent);
      border-color: transparent;
      color: #000;
      font-weight: 600;
    }

    .ctrl-btn.primary:hover { background: var(--accent2); }

    .ctrl-btn.repeat-on {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Track list ── */
    #track-col {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #add-form {
      padding: 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .form-input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      background: var(--bg3);
      color: var(--text);
      font-size: 13px;
      outline: none;
      font-family: 'DM Sans', system-ui, sans-serif;
      transition: border-color 0.12s;
    }

    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--text3); }

    #add-btn {
      padding: 9px;
      border: none;
      background: var(--accent);
      color: #000;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: 'DM Sans', system-ui, sans-serif;
      transition: background 0.12s;
    }

    #add-btn:hover { background: var(--accent2); }

    #error { font-size: 12px; color: var(--danger); display: none; padding: 0 2px; }

    #track-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px 6px;
      flex-shrink: 0;
    }

    #track-header span { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); }
    #track-count { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }

    #track-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px 8px;
    }

    #track-list::-webkit-scrollbar { width: 3px; }
    #track-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .track {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.1s;
      user-select: none;
    }

    .track:hover { background: var(--bg3); }

    .track.active { background: var(--bg3); }
    .track.active .track-num { color: var(--accent); }
    .track.active .track-title { color: var(--accent); }

    .track-num {
      font-size: 12px;
      color: var(--text3);
      min-width: 20px;
      text-align: center;
      font-family: 'DM Mono', monospace;
    }

    .track-info { flex: 1; min-width: 0; }

    .track-title {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 400;
    }

    .track-del {
      font-size: 12px;
      color: var(--text3);
      padding: 3px 6px;
      border-radius: 4px;
      border: none;
      background: none;
      cursor: pointer;
      opacity: 0;
      transition: color 0.1s;
    }

    .track:hover .track-del { opacity: 1; }
    .track-del:hover { color: var(--danger); }

    .empty {
      text-align: center;
      padding: 32px 16px;
      color: var(--text3);
      font-size: 13px;
      line-height: 1.6;
    }

    /* ── No playlist screen ── */
    #no-playlist {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: var(--text3);
    }

    #no-playlist .big { font-size: 40px; margin-bottom: 4px; }
    #no-playlist p { font-size: 14px; }
    #no-playlist button {
      margin-top: 8px;
      padding: 10px 22px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: 'DM Sans', system-ui, sans-serif;
    }

    /* ── Mobile ── */
    @media (max-width: 680px) {
      body { flex-direction: column; }

      #sidebar {
        width: 100%;
        min-width: unset;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
        flex-direction: row;
        flex-wrap: nowrap;
        overflow-x: auto;
        align-items: center;
        padding: 8px;
        gap: 4px;
      }

      #app-name { display: none; }
      #sidebar-label { display: none; }
      #playlist-list { display: flex; flex-direction: row; gap: 4px; overflow: visible; padding: 0; }
      .pl-item { white-space: nowrap; flex-shrink: 0; }
      #new-pl-btn { margin: 0; flex-shrink: 0; white-space: nowrap; }

      #body { grid-template-columns: 1fr; }
      #player-col { border-right: none; border-bottom: 1px solid var(--border); }
      #track-col { max-height: 40vh; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div id="app-name">🎵 MyTunes</div>
  <div id="sidebar-label">Playlists</div>
  <div id="playlist-list"></div>
  <button id="new-pl-btn" onclick="createPlaylist()">+ New playlist</button>
</div>

<!-- Main -->
<div id="main">

  <!-- No playlist screen -->
  <div id="no-playlist">
    <div class="big">🎵</div>
    <p>No playlist selected</p>
    <button onclick="createPlaylist()">+ Create playlist</button>
  </div>

  <!-- Playlist view -->
  <div id="pl-view" style="display:none; flex-direction:column; height:100%;">

    <div id="top-bar">
      <input id="pl-title" type="text" placeholder="Playlist name..." onchange="renamePlaylist(this.value)" spellcheck="false" />
      <button id="toggle-video-btn" onclick="toggleVideo()">Show video</button>
    </div>

    <div id="body">

      <!-- Player -->
      <div id="player-col">
        <div id="player-frame" class="hidden">Add a video to get started</div>

        <div id="now-playing">
          <div id="np-icon">🎵</div>
          <div id="np-text">
            <div id="np-label">Now playing</div>
            <div id="np-title">Nothing playing</div>
          </div>
        </div>

        <div id="controls">
          <button class="ctrl-btn" onclick="prevTrack()">&#9664;&#9664;</button>
          <button class="ctrl-btn primary" onclick="togglePlay()" id="play-btn">&#9654; Play</button>
          <button class="ctrl-btn" onclick="nextTrack()">&#9654;&#9654;</button>
          <button class="ctrl-btn" onclick="toggleRepeat()" id="repeat-btn" title="Repeat">&#8635;</button>
        </div>
      </div>

      <!-- Track list + add form -->
      <div id="track-col">
        <div id="add-form">
          <input class="form-input" id="url-input" type="text" placeholder="Paste YouTube URL..." />
          <input class="form-input" id="title-input" type="text" placeholder="Title (optional)" />
          <div id="error">Invalid YouTube URL</div>
          <button id="add-btn" onclick="addTrack()">+ Add video</button>
        </div>
        <div id="track-header">
          <span>Tracks</span>
          <span id="track-count">0</span>
        </div>
        <div id="track-list"><div class="empty">No videos yet<br/>Paste a YouTube link above</div></div>
      </div>

    </div>
  </div>
</div>

<script>
  // ── State ──
  let data = { playlists: [] };
  let activePl = null;
  let current = -1;
  let playing = false;
  let repeat = false;
  let showVideo = false;

  // ── Persist ──
  function save() {
    try { localStorage.setItem('mytunes_v1', JSON.stringify(data)); } catch(e) {}
  }

  function loadData() {
    try {
      const raw = localStorage.getItem('mytunes_v1');
      if (raw) data = JSON.parse(raw);
    } catch(e) { data = { playlists: [] }; }
  }

  // ── Playlists ──
  function createPlaylist() {
    const pl = { id: Date.now().toString(), name: 'New playlist', tracks: [] };
    data.playlists.push(pl);
    save();
    renderSidebar();
    selectPlaylist(pl.id);
    setTimeout(() => { const t = document.getElementById('pl-title'); t.focus(); t.select(); }, 60);
  }

  function selectPlaylist(id) {
    activePl = data.playlists.find(p => p.id === id) || null;
    current = -1;
    playing = false;
    clearPlayer();
    renderSidebar();
    renderView();
  }

  function renamePlaylist(name) {
    if (!activePl) return;
    activePl.name = name.trim() || 'Untitled';
    save();
    renderSidebar();
  }

  function deletePlaylist(id, e) {
    e.stopPropagation();
    if (!confirm('Delete this playlist?')) return;
    data.playlists = data.playlists.filter(p => p.id !== id);
    save();
    if (activePl && activePl.id === id) { activePl = null; current = -1; playing = false; }
    renderSidebar();
    renderView();
  }

  // ── Render ──
  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderSidebar() {
    const el = document.getElementById('playlist-list');
    if (!data.playlists.length) {
      el.innerHTML = '<div class="empty" style="font-size:12px;padding:8px 10px;">No playlists yet</div>';
      return;
    }
    el.innerHTML = data.playlists.map(pl => `
      <div class="pl-item ${activePl && activePl.id === pl.id ? 'active' : ''}" onclick="selectPlaylist('${pl.id}')">
        <span class="pl-dot"></span>
        <span class="pl-item-name">${esc(pl.name)}</span>
        <span class="pl-count">${pl.tracks.length}</span>
        <button class="pl-del" onclick="deletePlaylist('${pl.id}',event)">&#10005;</button>
      </div>
    `).join('');
  }

  function renderView() {
    const nopl = document.getElementById('no-playlist');
    const view = document.getElementById('pl-view');
    if (!activePl) { nopl.style.display = 'flex'; view.style.display = 'none'; return; }
    nopl.style.display = 'none';
    view.style.display = 'flex';
    document.getElementById('pl-title').value = activePl.name;
    renderTracks();
    updateVideoBtn();
  }

  function renderTracks() {
    if (!activePl) return;
    const el = document.getElementById('track-list');
    document.getElementById('track-count').textContent = activePl.tracks.length;
    if (!activePl.tracks.length) {
      el.innerHTML = '<div class="empty">No videos yet<br/>Paste a YouTube link above</div>';
      return;
    }
    el.innerHTML = activePl.tracks.map((t, i) => `
      <div class="track ${i === current ? 'active' : ''}" onclick="loadTrack(${i})">
        <span class="track-num">${i === current ? '&#9654;' : i + 1}</span>
        <div class="track-info"><div class="track-title">${esc(t.title)}</div></div>
        <button class="track-del" onclick="event.stopPropagation();removeTrack(${i})">&#10005;</button>
      </div>
    `).join('');
  }

  // ── Video toggle ──
  function toggleVideo() {
    showVideo = !showVideo;
    updateVideoBtn();
    if (current !== -1) refreshPlayer();
  }

  function updateVideoBtn() {
    const btn = document.getElementById('toggle-video-btn');
    if (showVideo) { btn.textContent = 'Hide video'; btn.classList.add('active'); }
    else { btn.textContent = 'Show video'; btn.classList.remove('active'); }
    document.getElementById('player-frame').classList.toggle('hidden', !showVideo);
  }

  // ── Player ──
  function extractId(url) {
    const patterns = [
      /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([A-Za-z0-9_-]{11})/,
      /youtube\.com\/shorts\/([A-Za-z0-9_-]{11})/
    ];
    for (const p of patterns) { const m = url.match(p); if (m) return m[1]; }
    return null;
  }

  function addTrack() {
    if (!activePl) return;
    const url = document.getElementById('url-input').value.trim();
    const titleInput = document.getElementById('title-input').value.trim();
    const err = document.getElementById('error');
    const id = extractId(url);
    if (!id) { err.style.display = 'block'; return; }
    err.style.display = 'none';
    const title = titleInput || 'Video ' + (activePl.tracks.length + 1);
    activePl.tracks.push({ id, title });
    save();
    document.getElementById('url-input').value = '';
    document.getElementById('title-input').value = '';
    renderTracks();
    if (activePl.tracks.length === 1) loadTrack(0);
  }

  function removeTrack(i) {
    activePl.tracks.splice(i, 1);
    save();
    if (current === i) { current = -1; clearPlayer(); }
    else if (current > i) current--;
    renderTracks();
  }

  function clearPlayer() {
    const pf = document.getElementById('player-frame');
    if (pf) { pf.innerHTML = ''; pf.textContent = 'Add a video to get started'; }
    setNowPlaying('Nothing playing', false);
    const pb = document.getElementById('play-btn');
    if (pb) pb.textContent = '\u25B6 Play';
    playing = false;
  }

  function setNowPlaying(title, isPlaying) {
    document.getElementById('np-title').textContent = title;
    const icon = document.getElementById('np-icon');
    icon.textContent = isPlaying ? '▶' : '🎵';
    if (isPlaying) icon.classList.add('playing'); else icon.classList.remove('playing');
  }

  function buildEmbedUrl(videoId, autoplay) {
    return `https://www.youtube.com/embed/${videoId}?autoplay=${autoplay ? 1 : 0}&rel=0&enablejsapi=1`;
  }

  function refreshPlayer() {
    if (current === -1 || !activePl) return;
    const t = activePl.tracks[current];
    const pf = document.getElementById('player-frame');
    if (showVideo) {
      pf.innerHTML = `<iframe src="${buildEmbedUrl(t.id, playing)}" allowfullscreen allow="autoplay"></iframe>`;
    } else {
      pf.innerHTML = '';
      pf.textContent = 'Audio only mode';
    }
  }

  function loadTrack(i) {
    if (!activePl) return;
    current = i;
    playing = true;
    const t = activePl.tracks[i];
    setNowPlaying(t.title, true);
    document.getElementById('play-btn').textContent = '\u23F8 Pause';
    refreshPlayer();
    renderTracks();
  }

  function togglePlay() {
    if (!activePl) return;
    if (current === -1 && activePl.tracks.length) { loadTrack(0); return; }
    if (current === -1) return;
    playing = !playing;
    document.getElementById('play-btn').textContent = playing ? '\u23F8 Pause' : '\u25B6 Play';
    setNowPlaying(activePl.tracks[current].title, playing);
    refreshPlayer();
  }

  function prevTrack() {
    if (!activePl || !activePl.tracks.length) return;
    loadTrack((current - 1 + activePl.tracks.length) % activePl.tracks.length);
  }

  function nextTrack() {
    if (!activePl || !activePl.tracks.length) return;
    if (repeat && current !== -1) { loadTrack(current); return; }
    loadTrack((current + 1) % activePl.tracks.length);
  }

  function toggleRepeat() {
    repeat = !repeat;
    const btn = document.getElementById('repeat-btn');
    if (repeat) btn.classList.add('repeat-on'); else btn.classList.remove('repeat-on');
  }

  // ── Events ──
  document.getElementById('url-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTrack(); });

  // ── PWA service worker ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  // ── Init ──
  loadData();
  renderSidebar();
