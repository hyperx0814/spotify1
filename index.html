<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Playlists</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #f1f1f1; min-height: 100vh; display: flex; }

    #sidebar { width: 220px; min-width: 220px; background: #141414; border-right: 1px solid #222; display: flex; flex-direction: column; height: 100vh; position: sticky; top: 0; }
    #sidebar-header { padding: 18px 16px 10px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #555; }
    #playlist-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
    .pl-item { display: flex; align-items: center; gap: 8px; padding: 9px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #aaa; transition: background 0.1s; }
    .pl-item:hover { background: #1e1e1e; color: #f1f1f1; }
    .pl-item.active { background: #222; color: #fff; }
    .pl-item-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pl-del { font-size: 12px; opacity: 0; border: none; background: none; color: #666; cursor: pointer; padding: 2px 4px; border-radius: 4px; }
    .pl-item:hover .pl-del { opacity: 1; }
    .pl-del:hover { color: #f87171; }
    #new-pl-btn { margin: 8px; padding: 9px; border: 1px dashed #2a2a2a; background: none; color: #666; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.15s; }
    #new-pl-btn:hover { border-color: #444; color: #aaa; }

    #main { flex: 1; padding: 24px; overflow-y: auto; }
    #main-inner { max-width: 900px; margin: 0 auto; }

    #pl-title { font-size: 22px; font-weight: 600; background: none; border: none; color: #fff; font-family: inherit; width: 100%; outline: none; margin-bottom: 20px; border-bottom: 1px solid transparent; }
    #pl-title:focus { border-bottom-color: #333; }

    #content { display: grid; grid-template-columns: 1fr 300px; gap: 16px; }
    #player-side { display: flex; flex-direction: column; gap: 12px; }
    #player-frame { width: 100%; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; background: #1a1a1a; border: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: center; color: #555; font-size: 14px; }
    #player-frame iframe { width: 100%; height: 100%; border: none; display: block; }
    #now-playing { padding: 12px 16px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; }
    #now-playing .label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    #now-playing .title { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #controls { display: flex; gap: 8px; }
    #controls button { flex: 1; padding: 10px; border: 1px solid #2a2a2a; background: #1a1a1a; border-radius: 8px; cursor: pointer; font-size: 13px; color: #f1f1f1; font-family: inherit; transition: background 0.15s; }
    #controls button:hover { background: #252525; }
    #controls button.primary { background: #fff; color: #000; border-color: transparent; font-weight: 500; }
    #controls button.primary:hover { background: #e0e0e0; }

    #track-side { display: flex; flex-direction: column; gap: 12px; }
    #add-form { display: flex; flex-direction: column; gap: 8px; padding: 14px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; }
    #add-form input { width: 100%; padding: 9px 12px; border: 1px solid #2a2a2a; border-radius: 8px; background: #111; color: #f1f1f1; font-size: 13px; outline: none; font-family: inherit; }
    #add-form input:focus { border-color: #444; }
    #add-form input::placeholder { color: #555; }
    #add-form button { padding: 9px; border: none; background: #fff; color: #000; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; }
    #add-form button:hover { background: #e0e0e0; }
    #error { font-size: 12px; color: #f87171; display: none; }
    #track-header { display: flex; justify-content: space-between; align-items: center; }
    #track-header span { font-size: 13px; font-weight: 500; }
    #track-header small { font-size: 12px; color: #666; }
    #track-list { display: flex; flex-direction: column; gap: 6px; max-height: 320px; overflow-y: auto; }
    #track-list::-webkit-scrollbar { width: 4px; }
    #track-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    .track { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; cursor: pointer; transition: background 0.1s; }
    .track:hover { background: #222; }
    .track.active { border-color: #555; }
    .track-num { font-size: 12px; color: #555; min-width: 18px; text-align: center; }
    .track-info { flex: 1; min-width: 0; }
    .track-title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-del { font-size: 13px; color: #f1f1f1; padding: 2px 6px; border-radius: 4px; border: none; background: none; cursor: pointer; opacity: 0; }
    .track:hover .track-del { opacity: 1; }
    .track-del:hover { color: #f87171; }
    .empty { text-align: center; padding: 28px; color: #555; font-size: 13px; }

    #no-playlist { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 12px; color: #555; text-align: center; }
    #no-playlist button { margin-top: 8px; padding: 10px 20px; background: #fff; color: #000; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; font-family: inherit; }

    @media (max-width: 700px) {
      body { flex-direction: column; }
      #sidebar { width: 100%; min-width: unset; height: auto; position: static; border-right: none; border-bottom: 1px solid #222; }
      #content { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">My Playlists</div>
  <div id="playlist-list"></div>
  <button id="new-pl-btn" onclick="createPlaylist()">+ New playlist</button>
</div>

<div id="main">
  <div id="main-inner">
    <div id="no-playlist">
      <div style="font-size:40px">🎵</div>
      <div style="font-size:15px">No playlist selected</div>
      <div style="font-size:13px">Create one to get started</div>
      <button onclick="createPlaylist()">+ New playlist</button>
    </div>

    <div id="pl-view" style="display:none;">
      <input id="pl-title" type="text" spellcheck="false" onchange="renamePlaylist(this.value)" />
      <div id="content">
        <div id="player-side">
          <div id="player-frame">Add a video to get started</div>
          <div id="now-playing">
            <div class="label">Now playing</div>
            <div class="title" id="np-title">Nothing playing</div>
          </div>
          <div id="controls">
            <button onclick="prevTrack()">&#9664;&#9664; Prev</button>
            <button class="primary" onclick="togglePlay()" id="play-btn">&#9654; Play</button>
            <button onclick="nextTrack()">Next &#9654;&#9654;</button>
          </div>
        </div>
        <div id="track-side">
          <div id="add-form">
            <input id="url-input" type="text" placeholder="Paste YouTube URL..." />
            <input id="title-input" type="text" placeholder="Title (optional)" />
            <div id="error">Invalid YouTube URL</div>
            <button onclick="addTrack()">+ Add video</button>
          </div>
          <div id="track-header">
            <span>Tracks</span>
            <small id="count">0 videos</small>
          </div>
          <div id="track-list"><div class="empty">No videos yet</div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let data = { playlists: [] };
  let activePl = null;
  let current = -1;
  let playing = false;

  function save() {
    localStorage.setItem('myplaylists_v1', JSON.stringify(data));
  }

  function loadData() {
    try {
      const raw = localStorage.getItem('myplaylists_v1');
      if (raw) data = JSON.parse(raw);
    } catch(e) { data = { playlists: [] }; }
  }

  function createPlaylist() {
    const pl = { id: Date.now().toString(), name: 'New playlist', tracks: [] };
    data.playlists.push(pl);
    save();
    renderSidebar();
    selectPlaylist(pl.id);
    setTimeout(() => { const t = document.getElementById('pl-title'); t.focus(); t.select(); }, 60);
  }

  function selectPlaylist(id) {
    activePl = data.playlists.find(p => p.id === id) || null;
    current = -1;
    playing = false;
    clearPlayer();
    renderSidebar();
    renderView();
  }

  function renamePlaylist(name) {
    if (!activePl) return;
    activePl.name = name.trim() || 'Untitled';
    save();
    renderSidebar();
  }

  function deletePlaylist(id, e) {
    e.stopPropagation();
    if (!confirm('Delete this playlist?')) return;
    data.playlists = data.playlists.filter(p => p.id !== id);
    save();
    if (activePl && activePl.id === id) { activePl = null; current = -1; playing = false; }
    renderSidebar();
    renderView();
  }

  function renderSidebar() {
    const el = document.getElementById('playlist-list');
    if (!data.playlists.length) {
      el.innerHTML = '<div class="empty" style="font-size:12px;padding:16px 10px;">No playlists yet</div>';
      return;
    }
    el.innerHTML = data.playlists.map(pl => `
      <div class="pl-item ${activePl && activePl.id === pl.id ? 'active' : ''}" onclick="selectPlaylist('${pl.id}')">
        <span style="font-size:14px">🎵</span>
        <span class="pl-item-name">${escHtml(pl.name)}</span>
        <button class="pl-del" onclick="deletePlaylist('${pl.id}', event)">&#10005;</button>
      </div>
    `).join('');
  }

  function renderView() {
    const nopl = document.getElementById('no-playlist');
    const view = document.getElementById('pl-view');
    if (!activePl) { nopl.style.display = 'flex'; view.style.display = 'none'; return; }
    nopl.style.display = 'none';
    view.style.display = 'block';
    document.getElementById('pl-title').value = activePl.name;
    renderTracks();
  }

  function renderTracks() {
    if (!activePl) return;
    const el = document.getElementById('track-list');
    document.getElementById('count').textContent = activePl.tracks.length + ' video' + (activePl.tracks.length !== 1 ? 's' : '');
    if (!activePl.tracks.length) { el.innerHTML = '<div class="empty">No videos yet</div>'; return; }
    el.innerHTML = activePl.tracks.map((t, i) => `
      <div class="track ${i === current ? 'active' : ''}" onclick="loadTrack(${i})">
        <span class="track-num">${i === current ? '&#9654;' : i + 1}</span>
        <div class="track-info"><div class="track-title">${escHtml(t.title)}</div></div>
        <button class="track-del" onclick="event.stopPropagation();removeTrack(${i})">&#10005;</button>
      </div>
    `).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function extractId(url) {
    const patterns = [
      /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([A-Za-z0-9_-]{11})/,
      /youtube\.com\/shorts\/([A-Za-z0-9_-]{11})/
    ];
    for (const p of patterns) { const m = url.match(p); if (m) return m[1]; }
    return null;
  }

  function addTrack() {
    if (!activePl) return;
    const url = document.getElementById('url-input').value.trim();
    const titleInput = document.getElementById('title-input').value.trim();
    const err = document.getElementById('error');
    const id = extractId(url);
    if (!id) { err.style.display = 'block'; return; }
    err.style.display = 'none';
    const title = titleInput || 'Video ' + (activePl.tracks.length + 1);
    activePl.tracks.push({ id, title });
    save();
    document.getElementById('url-input').value = '';
    document.getElementById('title-input').value = '';
    renderTracks();
    if (activePl.tracks.length === 1) loadTrack(0);
  }

  function removeTrack(i) {
    activePl.tracks.splice(i, 1);
    save();
    if (current === i) { current = -1; clearPlayer(); }
    else if (current > i) current--;
    renderTracks();
  }

  function clearPlayer() {
    const pf = document.getElementById('player-frame');
    if (pf) { pf.innerHTML = ''; pf.textContent = 'Add a video to get started'; }
    const np = document.getElementById('np-title');
    if (np) np.textContent = 'Nothing playing';
    const pb = document.getElementById('play-btn');
    if (pb) pb.textContent = '\u25B6 Play';
    playing = false;
  }

  function loadTrack(i) {
    if (!activePl) return;
    current = i;
    playing = true;
    const t = activePl.tracks[i];
    document.getElementById('np-title').textContent = t.title;
    document.getElementById('play-btn').textContent = '\u23F8 Pause';
    document.getElementById('player-frame').innerHTML = `<iframe src="https://www.youtube.com/embed/${t.id}?autoplay=1&rel=0" allowfullscreen allow="autoplay"></iframe>`;
    renderTracks();
  }

  function togglePlay() {
    if (!activePl) return;
    if (current === -1 && activePl.tracks.length) { loadTrack(0); return; }
    if (current === -1) return;
    playing = !playing;
    document.getElementById('play-btn').textContent = playing ? '\u23F8 Pause' : '\u25B6 Play';
    const t = activePl.tracks[current];
    document.getElementById('player-frame').innerHTML = `<iframe src="https://www.youtube.com/embed/${t.id}?autoplay=${playing?1:0}&rel=0" allowfullscreen allow="autoplay"></iframe>`;
  }

  function prevTrack() {
    if (!activePl || !activePl.tracks.length) return;
    loadTrack((current - 1 + activePl.tracks.length) % activePl.tracks.length);
  }

  function nextTrack() {
    if (!activePl || !activePl.tracks.length) return;
    loadTrack((current + 1) % activePl.tracks.length);
  }

  document.getElementById('url-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTrack(); });

  loadData();
  renderSidebar();
  renderView();
</script>
</body>
</html>
